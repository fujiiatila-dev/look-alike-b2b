<h2 mat-dialog-title>Refinar Deteccao</h2>

<mat-dialog-content [formGroup]="form" class="modal-content">
  <section class="control-row">
    <div class="control-head">
      <label>Confianca</label>
      <span>{{ form.controls.confidence.value.toFixed(2) }}</span>
    </div>
    <mat-slider min="0.1" max="0.99" step="0.01" discrete>
      <input matSliderThumb formControlName="confidence" />
    </mat-slider>
  </section>

  <section class="control-row">
    <div class="control-head">
      <label>FPS</label>
      <span>{{ form.controls.fps.value }}</span>
    </div>
    <mat-slider min="1" max="30" step="1" discrete>
      <input matSliderThumb formControlName="fps" />
    </mat-slider>
  </section>

  <section class="control-row">
    <div class="control-head">
      <label>Threshold</label>
      <span>{{ form.controls.threshold.value }}</span>
    </div>
    <mat-slider min="10" max="150" step="5" discrete>
      <input matSliderThumb formControlName="threshold" />
    </mat-slider>
  </section>
</mat-dialog-content>

<mat-dialog-actions align="end" class="modal-actions">
  <button mat-button type="button" (click)="close()">Cancelar</button>
  <button mat-flat-button color="primary" type="button" (click)="queueSubmit()" [disabled]="form.invalid">
    Reprocessar
  </button>
</mat-dialog-actions>
