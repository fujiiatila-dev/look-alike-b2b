<div class="profile-container">
  <div class="header">
    <h1>Perfil da Corporação</h1>
    <p>Gerencie as informações da sua conta corporativa para personalização do SaaS.</p>
  </div>

  <mat-card class="glass-card">
    <mat-card-header>
      <mat-icon mat-card-avatar>business</mat-icon>
      <mat-card-title>Dados Cadastrais</mat-card-title>
      <mat-card-subtitle>Informações para faturamento e suporte</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form class="profile-form" (ngSubmit)="salvar()">
        <div class="form-row">
          <mat-form-field appearance="outline">
            <mat-label>Nome Fantasia</mat-label>
            <input matInput [(ngModel)]="perfil().nome_fantasia" name="nome">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>CNPJ</mat-label>
            <input matInput [(ngModel)]="perfil().cnpj" name="cnpj">
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline">
            <mat-label>E-mail de Contato</mat-label>
            <input matInput type="email" [(ngModel)]="perfil().email_contato" name="email">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Telefone</mat-label>
            <input matInput [(ngModel)]="perfil().telefone" name="tel">
          </mat-form-field>
        </div>

        <mat-form-field appearance="outline">
          <mat-label>LinkedIn da Empresa</mat-label>
          <input matInput [(ngModel)]="perfil().linkedin" name="link">
          <mat-icon matSuffix>link</mat-icon>
        </mat-form-field>

        <div class="actions">
          <button mat-flat-button color="primary" [disabled]="loading()" type="submit">
            <mat-icon *ngIf="loading()">sync</mat-icon>
            Salvar Alterações
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
